name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.28.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Clean pnpm cache (version mismatch prevention)
        run: pnpm store prune

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Hardhat compiler
        uses: actions/cache@v4
        with:
          path: ~/.cache/hardhat-nodejs
          key: ${{ runner.os }}-hardhat-${{ hashFiles('hardhat.config.cjs') }}
          restore-keys: |
            ${{ runner.os }}-hardhat-

      - name: Compile smart contracts
        run: pnpm run compile

      - name: Type check
        run: pnpm exec tsc --noEmit

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.28.1

      - name: Setup Node.js (no cache to ensure fresh bcrypt build)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Clean pnpm cache (version mismatch prevention)
        run: pnpm store prune

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup test environment
        run: |
          cp .env.test .env
          echo "Test environment configured"

      - name: Cache Hardhat compiler
        uses: actions/cache@v4
        with:
          path: ~/.cache/hardhat-nodejs
          key: ${{ runner.os }}-hardhat-${{ hashFiles('hardhat.config.cjs') }}
          restore-keys: |
            ${{ runner.os }}-hardhat-

      - name: Compile smart contracts
        run: pnpm run compile

      - name: Run tests
        run: pnpm run test:ci

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.28.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Clean pnpm cache (version mismatch prevention)
        run: pnpm store prune

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Hardhat compiler
        uses: actions/cache@v4
        with:
          path: ~/.cache/hardhat-nodejs
          key: ${{ runner.os }}-hardhat-${{ hashFiles('hardhat.config.cjs') }}
          restore-keys: |
            ${{ runner.os }}-hardhat-

      - name: Compile smart contracts
        run: pnpm run compile

      - name: Build
        run: pnpm run build
