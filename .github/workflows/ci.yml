name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden-Runner
        uses: step-security/harden-runner@v2.12.0
        with:
          egress-policy: audit

      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Hardhat compiler
        uses: actions/cache@v4
        with:
          path: ~/.cache/hardhat-nodejs
          key: ${{ runner.os }}-hardhat-${{ hashFiles('hardhat.config.cjs') }}
          restore-keys: |
            ${{ runner.os }}-hardhat-

      - name: Compile smart contracts
        run: pnpm run compile

      - name: Type check
        run: pnpm exec tsc --noEmit

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden-Runner
        uses: step-security/harden-runner@v2.12.0
        with:
          egress-policy: audit

      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Hardhat compiler
        uses: actions/cache@v4
        with:
          path: ~/.cache/hardhat-nodejs
          key: ${{ runner.os }}-hardhat-${{ hashFiles('hardhat.config.cjs') }}
          restore-keys: |
            ${{ runner.os }}-hardhat-

      - name: Compile smart contracts
        run: pnpm run compile

      - name: Run tests
        run: pnpm test -- --coverage --passWithNoTests

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden-Runner
        uses: step-security/harden-runner@v2.12.0
        with:
          egress-policy: audit

      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Hardhat compiler
        uses: actions/cache@v4
        with:
          path: ~/.cache/hardhat-nodejs
          key: ${{ runner.os }}-hardhat-${{ hashFiles('hardhat.config.cjs') }}
          restore-keys: |
            ${{ runner.os }}-hardhat-

      - name: Compile smart contracts
        run: pnpm run compile

      - name: Build
        run: pnpm run build
