name: Deploy to HuggingFace Space

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://protechph-freelancexchain.hf.space
    steps:
      - name: Harden-Runner
        uses: step-security/harden-runner@v2.12.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compile smart contracts
        run: pnpm run compile

      - name: Commit compiled artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f artifacts cache
          git diff --staged --quiet || git commit -m "chore: add compiled contract artifacts"

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global credential.helper store
          echo "https://ProTechPh:${HF_TOKEN}@huggingface.co" > ~/.git-credentials
          git remote add huggingface https://huggingface.co/spaces/ProTechPh/FreelanceXchain
          git push huggingface main --force
          rm -f ~/.git-credentials
