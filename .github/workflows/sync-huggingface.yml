name: Deploy to HuggingFace Space

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://protechph-freelancexchain.hf.space
    steps:
      - name: Harden-Runner
        uses: step-security/harden-runner@v2.14.2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global credential.helper store
          echo "https://ProTechPh:${HF_TOKEN}@huggingface.co" > ~/.git-credentials
          git remote add huggingface https://huggingface.co/spaces/ProTechPh/FreelanceXchain
          git push huggingface main --force
          rm -f ~/.git-credentials
