name: Smart Contracts CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'contracts/**'
      - 'hardhat.config.cjs'
  pull_request:
    branches: [main]
    paths:
      - 'contracts/**'
      - 'hardhat.config.cjs'

permissions:
  contents: read

jobs:
  compile-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Harden-Runner
        uses: step-security/harden-runner@v2.12.0
        with:
          egress-policy: audit

      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compile contracts
        run: pnpm run compile

  slither:
    runs-on: ubuntu-latest
    steps:
      - name: Harden-Runner
        uses: step-security/harden-runner@v2.12.0
        with:
          egress-policy: audit

      - uses: actions/checkout@v4

      - name: Run Slither
        uses: crytic/slither-action@v0.4.0
        with:
          target: 'contracts/'
          slither-args: '--exclude-dependencies'
          fail-on: high
